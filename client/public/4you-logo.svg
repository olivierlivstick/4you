<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#6C3AED" flood-opacity="0.25"/>
    </filter>
    <filter id="playGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- === GIFT CARD ICON === -->
  <g transform="translate(20, 18)">
    <!-- Card body -->
    <rect x="0" y="30" width="130" height="88" rx="12" ry="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
    
    <!-- Card shine lines -->
    <rect x="12" y="50" width="40" height="4" rx="2" fill="white" opacity="0.25"/>
    <rect x="12" y="60" width="25" height="4" rx="2" fill="white" opacity="0.15"/>
    
    <!-- Magnetic stripe detail -->
    <rect x="0" y="85" width="130" height="12" rx="0" fill="white" opacity="0.08"/>
    
    <!-- Ribbon horizontal -->
    <rect x="0" y="68" width="130" height="5" rx="2" fill="url(#ribbonGrad)" opacity="0.7"/>
    
    <!-- Ribbon vertical -->
    <rect x="60" y="30" width="5" height="88" rx="2" fill="url(#ribbonGrad)" opacity="0.7"/>
    
    <!-- Bow -->
    <ellipse cx="62" cy="30" rx="16" ry="10" fill="none" stroke="#F472B6" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="62" cy="30" rx="8" ry="6" fill="#F472B6" opacity="0.5"/>
    
    <!-- Play button -->
    <g transform="translate(100, 82)" filter="url(#playGlow)">
      <circle cx="0" cy="0" r="22" fill="url(#playGrad)"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <polygon points="-6,-9 -6,9 10,0" fill="white"/>
    </g>
    
    <!-- Video wave arcs -->
    <g transform="translate(100, 82)" opacity="0.5">
      <path d="M 26,-8 Q 34,0 26,8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M 32,-14 Q 44,0 32,14" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
      <path d="M 38,-19 Q 53,0 38,19" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    </g>
  </g>

  <!-- === WORDMARK "4you" small, aligned to bottom of card, right side === -->
  <g transform="translate(162, 98)">
    <text x="0" y="30" font-family="'Poppins', 'Montserrat', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="url(#cardGrad)" letter-spacing="-2">4</text>
    <text x="24" y="30" font-family="'Poppins', 'Montserrat', 'Segoe UI', sans-serif" font-size="36" font-weight="300" fill="#1E1B4B" letter-spacing="-1">you</text>
  </g>
</svg>